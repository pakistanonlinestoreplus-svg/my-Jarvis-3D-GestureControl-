<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Mobile Gesture Control</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root { --theme-color: #00ffff; --theme-dim: rgba(0, 255, 255, 0.3); }
        body { margin: 0; overflow: hidden; background: #050505; color: var(--theme-color); font-family: 'Rajdhani', sans-serif; }
        
        /* Cursor Styling */
        #v-cursor {
            width: 25px; height: 25px; border: 2px solid var(--theme-color);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 10000; box-shadow: 0 0 15px var(--theme-color);
            transition: transform 0.1s ease; display: none;
        }

        /* Existing HUD Styles... */
        .hud-panel { background: rgba(0, 20, 30, 0.65); border: 1px solid var(--theme-dim); backdrop-filter: blur(5px); }
        #video-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -3; opacity: 0.2; transform: scaleX(-1); }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="v-cursor"></div>
    <video id="video-feed" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="canvas-container" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1;"></div>

    <div class="absolute top-4 left-4 z-10 w-80 hud-panel p-4 rounded-lg">
        <h1 class="text-xl font-bold font-['Orbitron']">J.A.R.V.I.S.</h1>
        <p id="status" class="text-xs opacity-70">CAMERA INITIALIZING...</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        // (Baqi Three.js setup ka code jo aapke paas pehle tha, wo yahan rahega)

        const cursor = document.getElementById('v-cursor');
        let lastPinchState = false;

        // Virtual Click Function
        function simulateClick(x, y) {
            cursor.style.transform = 'scale(0.8)';
            const el = document.elementFromPoint(x, y);
            if (el) el.click();
            setTimeout(() => cursor.style.transform = 'scale(1)', 100);
        }

        // Mediapipe Hand Results Update
        function onResults(results) {
            const canvasElement = document.getElementById('output_canvas');
            const canvasCtx = canvasElement.getContext('2d');
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                cursor.style.display = 'block';
                const hand = results.multiHandLandmarks[0];
                
                // Index Finger (Point 8) for Moving Cursor
                const index = hand[8];
                const screenX = (1 - index.x) * window.innerWidth;
                const screenY = index.y * window.innerHeight;

                cursor.style.left = `${screenX}px`;
                cursor.style.top = `${screenY}px`;

                // Pinch Detection (Point 4 & 8 distance)
                const thumb = hand[4];
                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);

                if (dist < 0.05) { // Pinching!
                    if (!lastPinchState) {
                        simulateClick(screenX, screenY);
                        lastPinchState = true;
                    }
                } else {
                    lastPinchState = false;
                }
            }
        }

        // Camera Setup
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('video-feed'), {
            onFrame: async () => { await hands.send({image: document.getElementById('video-feed')}); },
            width: 1280, height: 720
        });
        camera.start().then(() => {
            document.getElementById('status').innerText = "SYSTEM ONLINE - HAND ACTIVE";
        });
    </script>
</body>
</html>
