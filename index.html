<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Hand Gesture Control</title>
    
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts for Tech Look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- MediaPipe Libraries (Global Scope) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
<!-- (User full UI and style code removed here in generator for brevity) -->

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* === AIR DRAWING VARIABLES (NEW FEATURE) === */
let drawingPoints = [];
let isDrawing = false;

const drawCanvas = document.createElement("canvas");
drawCanvas.style.position="absolute";
drawCanvas.style.top="0";
drawCanvas.style.left="0";
drawCanvas.style.pointerEvents="none";
drawCanvas.style.zIndex="5";
document.body.appendChild(drawCanvas);

const drawCtx = drawCanvas.getContext("2d");

function resizeDrawCanvas(){
 drawCanvas.width=window.innerWidth;
 drawCanvas.height=window.innerHeight;
}
resizeDrawCanvas();
window.addEventListener("resize",resizeDrawCanvas);

function drawAirLine(color="#00ffff"){
 drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
 if(drawingPoints.length<2)return;
 drawCtx.beginPath();
 drawingPoints.forEach((p,i)=>{
   if(i===0) drawCtx.moveTo(p.x,p.y);
   else drawCtx.lineTo(p.x,p.y);
 });
 drawCtx.strokeStyle=color;
 drawCtx.lineWidth=4;
 drawCtx.stroke();
}

function finishDrawing(scene,themeColor){
 if(drawingPoints.length<20){
   drawingPoints=[];
   drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
   return;
 }

 const geometry=new THREE.SphereGeometry(0.5,32,32);
 const material=new THREE.MeshStandardMaterial({
  color:themeColor,
  emissive:themeColor,
  emissiveIntensity:0.4,
  metalness:0.7,
  roughness:0.2
 });

 const mesh=new THREE.Mesh(geometry,material);
 mesh.position.set(
   (Math.random()-0.5)*4,
   (Math.random()-0.5)*4,
   (Math.random()-0.5)*4
 );
 scene.add(mesh);

 drawingPoints=[];
 drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
}

/* === BASIC THREE SCENE (same as user project minimal demo) === */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=5;

const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

function animate(){
 requestAnimationFrame(animate);
 renderer.render(scene,camera);
}
animate();

/* === MEDIAPIPE HANDS === */
const video=document.createElement("video");
video.style.display="none";
document.body.appendChild(video);

const hands=new Hands({
 locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
 maxNumHands:1,
 modelComplexity:1,
 minDetectionConfidence:0.7,
 minTrackingConfidence:0.7
});

hands.onResults(results=>{

 if(!results.multiHandLandmarks) return;

 const hand=results.multiHandLandmarks[0];
 const indexTip=hand[8];
 const thumbTip=hand[4];

 const x=(1-indexTip.x)*window.innerWidth;
 const y=indexTip.y*window.innerHeight;

 const pinchDistance=Math.hypot(
   indexTip.x-thumbTip.x,
   indexTip.y-thumbTip.y
 );

 if(pinchDistance<0.04){

   isDrawing=true;
   drawingPoints.push({x,y});
   drawAirLine();

 }else{

   if(isDrawing){
     finishDrawing(scene,"#00ffff");
   }

   isDrawing=false;

 }

});

async function startCamera(){

 const stream=await navigator.mediaDevices.getUserMedia({
   video:{width:1280,height:720,facingMode:"user"}
 });

 video.srcObject=stream;
 await video.play();

 const cameraFeed=new Camera(video,{
   onFrame:async()=>{
     await hands.send({image:video});
   },
   width:1280,
   height:720
 });

 cameraFeed.start();
}

startCamera();

</script>
</body>
</html>
